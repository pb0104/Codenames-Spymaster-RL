name: base
seed: 7

data:
  board_words_path: data/raw/codenames_words.txt
  clue_words_path: data/raw/hints.txt

embedding:
  dim: 300
  use_wordnet: true
  max_clues: 8000
  min_clue_length: 3
  max_clue_length: 12
  download_nltk: false
  nltk_packages:
    - words
    - wordnet
    - omw-1.4

env:
  rows: 5
  cols: 5
  num_friendly: 8
  num_opponent: 8
  num_neutral: 8
  num_assassin: 1
  max_turns: 9
  max_clue_count: 9
  goal_size: 3

reward:
  turn_penalty: -1.0
  assassin_penalty: -25.0
  shaped_weight: 1.0

bc:
  enabled: true
  demo_episodes: 24
  pretrain_epochs: 3
  batch_size: 32
  learning_rate: 0.001
  seed_replay_buffer: true

training:
  use_her: true
  total_timesteps: 600
  learning_rate: 0.0003
  buffer_size: 20000
  learning_starts: 50
  batch_size: 64
  gamma: 0.99
  tau: 0.005
  n_sampled_goal: 4
  goal_selection_strategy: future
  net_arch:
    - 256
    - 256

evaluation:
  episodes: 3
  deterministic: true

output:
  output_dir: experiments/logs
  metrics_file: training_metrics.json
  model_file: sac_her_model.zip
